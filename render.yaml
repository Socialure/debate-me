services:
  - type: web
    name: debate-me
    runtime: node
    repo: https://github.com/Socialure/debate-me
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_AGENT_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: NODE_ENV
        value: production
